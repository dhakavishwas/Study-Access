<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Study Access | Login</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Arial;
        background: #eef3ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: #fff;
        padding: 35px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 360px;
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 8px;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 8px;
      }
      a {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Study Access Login</h2>
      <input type="email" placeholder="Email" /><input
        type="password"
        placeholder="Password"
      /><label><input type="checkbox" /> Remember me</label
      ><button>Login</button>
      <p><a href="register.html">Create an account</a></p>
      <p><a href="#">Forgot Password?</a></p>
      footer>
        <p class="copyright">© 2026 Study Access | All Rights Reserved.</p>
        <p class="credits">Made with ❤️ by Vishwas Dhaka</p>
      </footer>
    </div>
  </body>
</html>
